<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>User Card</title>
</head>

<body>
    <div class="container">
        <div class="top-nav">
        </div>
        <div class="main">
            <h1>Hosni Ahmad</h1>
            <div class="map">
                <img src="icons/map-marker.png" alt="map-marker">
                <p>Palestine</p>
            </div>
            <p id="skills">Developer | Engineer | Problem solver</p>
            <p id="title">Master of shadows and the internet</p>
            <div class="profile">
                <img src="icons/gear.png" alt="settings-icon">
                <p><a href="#">edit profile</a></p>
            </div>
        </div>
        <div class="user-image">
            <img src="icons/user-circle.png" alt="User photo">
        </div>

    </div>
</body>

</html>
